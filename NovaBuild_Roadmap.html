<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaBuild Summer Roadmap</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f7; color: #1a1a1a; padding: 2rem 1rem; }
.container { max-width: 680px; margin: 0 auto; }
h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
.metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.metric { background: #f0ede8; border-radius: 8px; padding: 0.75rem 1rem; }
.metric-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.metric-value { font-size: 22px; font-weight: 500; color: #1a1a1a; }
.metric-value span { font-size: 13px; font-weight: 400; color: #888; }
.phase { border: 0.5px solid #ddd; border-radius: 12px; margin-bottom: 12px; overflow: hidden; background: #fff; }
.phase-header { display: flex; align-items: center; gap: 12px; padding: 0.9rem 1.1rem; cursor: pointer; user-select: none; }
.phase-header:hover { background: #f9f9f7; }
.phase-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.dot-done { background: #1D9E75; }
.dot-active { background: #378ADD; }
.dot-upcoming { background: #ccc; }
.phase-title { font-size: 14px; font-weight: 500; flex: 1; }
.phase-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; }
.badge-done { background: #E1F5EE; color: #0F6E56; }
.badge-active { background: #E6F1FB; color: #185FA5; }
.badge-upcoming { background: #f0ede8; color: #888; }
.phase-progress { font-size: 12px; color: #888; }
.chevron { font-size: 14px; color: #aaa; transition: transform 0.2s; }
.chevron.open { transform: rotate(90deg); }
.phase-body { padding: 0 1.1rem 1rem; border-top: 0.5px solid #eee; display: none; }
.phase-body.open { display: block; }
.progress-bar-wrap { height: 4px; background: #eee; border-radius: 2px; margin: 0.75rem 0 0.5rem; }
.progress-bar { height: 4px; border-radius: 2px; background: #378ADD; transition: width 0.3s; }
.milestone { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 0.5px solid #f0ede8; }
.milestone:last-child { border-bottom: none; }
.check { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid #ccc; cursor: pointer; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: all 0.15s; }
.check.checked { background: #1D9E75; border-color: #1D9E75; color: white; }
.milestone-text { font-size: 13px; line-height: 1.4; flex: 1; }
.milestone-text.checked { color: #aaa; text-decoration: line-through; }
.milestone-tag { font-size: 11px; padding: 1px 7px; border-radius: 20px; flex-shrink: 0; margin-top: 2px; }
.tag-action { background: #FAEEDA; color: #633806; }
.tag-learn { background: #EEEDFE; color: #3C3489; }
.tag-pitch { background: #FAECE7; color: #712B13; }
.section-label { font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin: 1rem 0 0.4rem; }
.client-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 0.5px solid #f0ede8; }
.client-row:last-child { border-bottom: none; }
.client-name { font-size: 13px; flex: 1; }
.client-status { font-size: 11px; padding: 2px 8px; border-radius: 20px; cursor: pointer; }
.s0 { background: #f0ede8; color: #888; }
.s1 { background: #FAEEDA; color: #633806; }
.s2 { background: #E6F1FB; color: #185FA5; }
.s3 { background: #EAF3DE; color: #27500A; }
@media (max-width: 480px) {
  .metrics { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="container">
  <h1>NovaBuild — Summer Roadmap</h1>
  <p class="subtitle">April 2026 → August 2026 · Stillwater, OK</p>

  <div class="metrics">
    <div class="metric"><div class="metric-label">Clients closed</div><div class="metric-value" id="m-clients">1 <span>/ 10</span></div></div>
    <div class="metric"><div class="metric-label">On social mgmt</div><div class="metric-value" id="m-social">0 <span>/ 3</span></div></div>
    <div class="metric"><div class="metric-label">Tasks done</div><div class="metric-value" id="m-tasks">0<span>%</span></div></div>
    <div class="metric"><div class="metric-label">Time to Dallas</div><div class="metric-value">~16 <span>wks</span></div></div>
  </div>

  <div id="phases"></div>

  <div class="phase">
    <div class="phase-header" onclick="togglePhase('clients')">
      <div class="phase-dot dot-active"></div>
      <div class="phase-title">Client pipeline</div>
      <div class="chevron" id="chev-clients">›</div>
    </div>
    <div class="phase-body" id="body-clients">
      <div class="section-label">Tap status to cycle: prospect → outreach → meeting → closed</div>
      <div id="client-list"></div>
    </div>
  </div>
</div>

<script>
const STATUSES = ['Prospect','Outreach sent','Meeting set','Closed'];
const STATUS_CLS = ['s0','s1','s2','s3'];

const clients = [
  {name:'Memory Lane Vintage Mall', s:3},
  {name:'Gym One Fitness', s:1},
  {name:'Territory Distillery', s:0},
  {name:'Game Time Cuts', s:0},
  {name:'Headliners Barber Shop', s:0},
  {name:'The Curty Shack', s:0},
  {name:'Empower Fit Studios', s:0},
  {name:'Step4ward Fitness', s:0},
  {name:'Granny\'s Kitchen', s:0},
  {name:'Birchfield Barber Co.', s:0},
  {name:'Screw It Handyman', s:0},
  {name:'Kal\'s Lawn Care', s:0},
];

const phases = [
  { id:'p1', title:'Phase 1 — deliver Memory Lane', status:'active', items:[
    {text:'Send follow-up email with recap + next steps', tag:'action'},
    {text:'Collect store photos from client', tag:'action'},
    {text:'Build Memory Lane website draft', tag:'action'},
    {text:'First draft review meeting', tag:'action'},
    {text:'Revisions + final approval', tag:'action'},
    {text:'Launch site', tag:'action'},
  ]},
  { id:'p2', title:'Phase 2 — close 2-3 more websites', status:'active', items:[
    {text:'Send outreach emails to top 5 prospects', tag:'action'},
    {text:'Follow up on Gym One Fitness', tag:'action'},
    {text:'Reach out to Territory Distillery', tag:'action'},
    {text:'Close 2nd client', tag:'pitch'},
    {text:'Close 3rd client', tag:'pitch'},
  ]},
  { id:'p3', title:'Phase 3 — add social management', status:'upcoming', items:[
    {text:'Learn Buffer — spend one afternoon on it', tag:'learn'},
    {text:'Draft a social management service offering', tag:'action'},
    {text:'Pitch social mgmt to Memory Lane ($150-200/mo)', tag:'pitch'},
    {text:'Deliver first month of social content for client', tag:'action'},
    {text:'Use as case study for next pitch', tag:'pitch'},
  ]},
  { id:'p4', title:'Phase 4 — scale to 10 clients + Dallas prep', status:'upcoming', items:[
    {text:'Reach out to remaining prospects on list', tag:'action'},
    {text:'Get 2nd client on social management', tag:'pitch'},
    {text:'Get 3rd client on social management', tag:'pitch'},
    {text:'Research Dallas suburban market (McKinney, Southlake, Coppell)', tag:'learn'},
    {text:'Build NovaBuild Dallas pitch using Stillwater case studies', tag:'action'},
  ]},
];

const checks = {};
const phaseOpen = {p1:true, p2:false, p3:false, p4:false, clients:false};

function togglePhase(id) {
  phaseOpen[id] = !phaseOpen[id];
  document.getElementById('body-'+id).className = 'phase-body' + (phaseOpen[id] ? ' open' : '');
  document.getElementById('chev-'+id).className = 'chevron' + (phaseOpen[id] ? ' open' : '');
}

function cycleStatus(i) {
  clients[i].s = (clients[i].s + 1) % STATUSES.length;
  renderClients();
  updateMetrics();
}

function toggleCheck(id) {
  checks[id] = !checks[id];
  document.getElementById('ck-'+id).className = 'check' + (checks[id] ? ' checked' : '');
  document.getElementById('ck-'+id).textContent = checks[id] ? '✓' : '';
  document.getElementById('txt-'+id).className = 'milestone-text' + (checks[id] ? ' checked' : '');
  updateMetrics();
  updatePhaseBars();
}

function updateMetrics() {
  const closed = clients.filter(c => c.s === 3).length;
  document.getElementById('m-clients').innerHTML = closed + ' <span>/ 10</span>';
  const all = phases.reduce((a,p) => a + p.items.length, 0);
  const done = Object.values(checks).filter(Boolean).length;
  document.getElementById('m-tasks').innerHTML = Math.round(done/all*100) + '<span>%</span>';
}

function updatePhaseBars() {
  phases.forEach(p => {
    const done = p.items.filter((_,i) => checks[p.id+'-'+i]).length;
    const bar = document.getElementById('bar-'+p.id);
    const prog = document.getElementById('prog-'+p.id);
    if (bar) bar.style.width = Math.round(done/p.items.length*100)+'%';
    if (prog) prog.textContent = done+'/'+p.items.length;
  });
}

function renderClients() {
  document.getElementById('client-list').innerHTML = clients.map((c,i) => `
    <div class="client-row">
      <div class="client-name">${c.name}</div>
      <div class="client-status ${STATUS_CLS[c.s]}" onclick="cycleStatus(${i})">${STATUSES[c.s]}</div>
    </div>`).join('');
}

function renderPhases() {
  document.getElementById('phases').innerHTML = phases.map(p => {
    const dotCls = p.status === 'done' ? 'dot-done' : p.status === 'active' ? 'dot-active' : 'dot-upcoming';
    const badgeCls = p.status === 'done' ? 'badge-done' : p.status === 'active' ? 'badge-active' : 'badge-upcoming';
    const badgeTxt = p.status === 'done' ? 'Done' : p.status === 'active' ? 'In progress' : 'Upcoming';
    return `<div class="phase">
      <div class="phase-header" onclick="togglePhase('${p.id}')">
        <div class="phase-dot ${dotCls}"></div>
        <div class="phase-title">${p.title}</div>
        <div class="phase-badge ${badgeCls}">${badgeTxt}</div>
        <div class="phase-progress" id="prog-${p.id}">0/${p.items.length}</div>
        <div class="chevron${phaseOpen[p.id] ? ' open':''}" id="chev-${p.id}">›</div>
      </div>
      <div class="phase-body${phaseOpen[p.id] ? ' open':''}" id="body-${p.id}">
        <div class="progress-bar-wrap"><div class="progress-bar" id="bar-${p.id}" style="width:0%"></div></div>
        ${p.items.map((item,i) => `
          <div class="milestone">
            <div class="check" id="ck-${p.id}-${i}" onclick="toggleCheck('${p.id}-${i}')"></div>
            <div class="milestone-text" id="txt-${p.id}-${i}">${item.text}</div>
            <div class="milestone-tag tag-${item.tag}">${item.tag}</div>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

renderPhases();
renderClients();
updateMetrics();
</script>
</body>
</html>
